<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline | Pro Messaging</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --dark: #0f172a; --glass: rgba(255,255,255,0.9); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); height: 100vh; display: flex; flex-direction: column; }

        /* Login */
        #login-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { width: 320px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

        /* App Interface */
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; }

        #chat-scroller { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; position: relative; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--p); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: white; color: var(--dark); border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .meta { font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; display: block; font-weight: bold; }
        
        /* Media Styling */
        .media-content { width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        /* Footer & Actions */
        footer { background: white; padding: 15px; border-top: 1px solid #e2e8f0; }
        .input-box { display: flex; gap: 10px; align-items: center; max-width: 900px; margin: 0 auto; }
        .icon-btn { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        
        /* Sound Toggle */
        .sound-opt { font-size: 0.8rem; display: flex; align-items: center; gap: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card">
            <h2 style="margin-top:0">Sign In</h2>
            <input type="text" id="username" placeholder="Choose a Nickname">
            <button class="btn" onclick="login()">Enter Chat</button>
        </div>
    </div>

    <header>
        <div>
            <b id="header-user">Global Room</b><br>
            <span style="font-size: 0.7rem;"><span class="status-dot"></span> Active Feed</span>
        </div>
        <div class="sound-opt" onclick="toggleSound()">
            <span id="sound-icon">🔔</span> <span id="sound-text">Alert: On</span>
        </div>
    </header>

    <div id="chat-scroller"></div>

    <footer>
        <div class="input-box">
            <label class="icon-btn">
                📎<input type="file" id="media-file" hidden accept="image/*,video/*" onchange="uploadMedia()">
            </label>
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button class="icon-btn" style="background: var(--p); color: white;" onclick="sendText()">➤</button>
        </div>
    </footer>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    // 1. ADD YOUR FIREBASE CONFIG
    const firebaseConfig = {
  apiKey: "AIzaSyBWtfnkI4DjCRrCMAhOXgF6xORY-D9A9mw",
  authDomain: "message-a82b4.firebaseapp.com",
  projectId: "message-a82b4",
  storageBucket: "message-a82b4.firebasestorage.app",
  messagingSenderId: "571635548948",
  appId: "1:571635548948:web:5ef619ee57a8b298327801"P_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let me = "";
    let soundEnabled = true;

    function login() {
        const val = document.getElementById('username').value.trim();
        if(!val) return;
        me = val;
        document.getElementById('login-overlay').style.display = 'none';
        sync();
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('sound-text').innerText = `Alert: ${soundEnabled ? 'On' : 'Off'}`;
        document.getElementById('sound-icon').innerText = soundEnabled ? '🔔' : '🔕';
    }

    async function sendText() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        saveMsg({ user: me, text: input.value, type: 'text' });
        input.value = "";
    }

    async function uploadMedia() {
        const file = document.getElementById('media-file').files[0];
        if(!file) return;

        const path = `chat/${Date.now()}_${file.name}`;
        const ref = storage.ref().child(path);
        
        alert("Uploading media... please wait.");
        await ref.put(file);
        const url = await ref.getDownloadURL();
        
        saveMsg({ 
            user: me, 
            url: url, 
            type: file.type.startsWith('image') ? 'image' : 'video' 
        });
    }

    function saveMsg(data) {
        db.collection("global_chat").add({
            ...data,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    function sync() {
        let isFirstLoad = true;
        db.collection("global_chat").orderBy("time", "asc")
          .onSnapshot((snap) => {
            const scroller = document.getElementById('chat-scroller');
            scroller.innerHTML = "";
            
            snap.forEach((doc) => {
                const m = doc.data();
                const isMe = m.user === me;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                
                let content = m.text ? `<div>${m.text}</div>` : '';
                if(m.type === 'image') content = `<img src="${m.url}" class="media-content">`;
                if(m.type === 'video') content = `<video src="${m.url}" controls class="media-content"></video>`;

                div.innerHTML = `<span class="meta">${m.user}</span>${content}`;
                scroller.appendChild(div);
            });

            scroller.scrollTop = scroller.scrollHeight;

            // Trigger Ringtone for 5 seconds on NEW messages only
            if(!isFirstLoad && soundEnabled) {
                const audio = document.getElementById('alert-sound');
                audio.play();
                setTimeout(() => { audio.pause(); audio.currentTime = 0; }, 5000);
            }
            isFirstLoad = false;
        });
    }

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };
</script>
</body>
</html>
