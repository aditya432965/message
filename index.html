<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON CLOUD | Real-time Messaging</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --glass: rgba(255, 255, 255, 0.08);
            --bg-dark: #020617;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1e1b4b, #020617);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 90vw;
            max-width: 500px;
            height: 80vh;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 5px 15px 5px 5px;
            border-radius: 50px;
        }

        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-wrap {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .msg-wrap.me { align-self: flex-end; }
        .msg-wrap.them { align-self: flex-start; }

        .sender-name {
            font-size: 0.7rem;
            margin-bottom: 4px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .me .bubble {
            background: linear-gradient(135deg, var(--neon-blue), #3b82f6);
            border-bottom-right-radius: 4px;
        }

        .them .bubble {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .input-wrap {
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 15px;
            color: white;
            outline: none;
        }

        button {
            background: var(--neon-pink);
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Overlay for Nickname */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1>Enter the Nexus</h1>
    <input type="text" id="nick-input" placeholder="Your Nickname..." style="width: 250px;">
    <button onclick="startApp()" style="height: 45px; width: 250px;">INITIALIZE</button>
</div>

<div class="app-container">
    <header>
        <div class="profile-chip">
            <div class="avatar" id="my-avatar">?</div>
            <span id="my-name">Guest</span>
        </div>
        <div style="color: var(--neon-blue); font-weight: 900;">LIVE_FEED</div>
    </header>

    <div id="chat-box"></div>

    <div class="input-wrap">
        <input type="text" id="message-input" placeholder="Transmit message..." onkeypress="checkEnter(event)">
        <button onclick="sendToCloud()">SEND</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    // PASTE YOUR FIREBASE CONFIG OBJECT HERE
    const firebaseConfig = {
         apiKey: "AIzaSyBWtfnkI4DjCRrCMAhOXgF6xORY-D9A9mw",
  authDomain: "message-a82b4.firebaseapp.com",
  projectId: "message-a82b4",
  storageBucket: "message-a82b4.firebasestorage.app",
  messagingSenderId: "571635548948",
  appId: "1:571635548948:web:5ef619ee57a8b298327801"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const chatRef = database.ref('messages');

    let username = "";

    function startApp() {
        const input = document.getElementById('nick-input');
        if(!input.value.trim()) return;
        username = input.value;
        document.getElementById('my-name').innerText = username;
        document.getElementById('my-avatar').innerText = username.charAt(0).toUpperCase();
        document.getElementById('login-overlay').style.display = 'none';
        listenForMessages();
    }

    function sendToCloud() {
        const input = document.getElementById('message-input');
        if(!input.value.trim()) return;

        chatRef.push({
            user: username,
            text: input.value,
            timestamp: Date.now()
        });

        input.value = '';
    }

    function listenForMessages() {
        chatRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';

            for(let id in data) {
                const msg = data[id];
                const isMe = msg.user === username;
                
                const div = document.createElement('div');
                div.className = `msg-wrap ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `
                    <span class="sender-name">${msg.user}</span>
                    <div class="bubble">${msg.text}</div>
                `;
                chatBox.appendChild(div);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function checkEnter(e) { if(e.key === 'Enter') sendToCloud(); }
</script>

</body>
</html>
