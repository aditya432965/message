<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreChat | Cloud Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --accent: #007aff; --bg: #f2f2f7; --me: #dcf8c6; --them: #ffffff; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; }

        /* Auth Overlay */
        #auth-screen { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 85%; max-width: 340px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; outline: none; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Main UI */
        #main-app { display: none; flex-direction: column; height: 100%; }
        header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        
        #chat-scroller { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Bubbles */
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--me); border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--them); border-bottom-left-radius: 2px; }
        .sender-tag { font-size: 0.7rem; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
        
        /* Media Display */
        .chat-img { width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        .chat-vid { width: 100%; border-radius: 8px; margin-top: 5px; }

        /* Footer Bar */
        footer { background: #fff; padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
        #msg-field { flex: 1; padding: 12px; background: #f0f0f2; border: none; border-radius: 20px; }
        
        .action-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 0 5px; }
        .sound-toggle { font-size: 0.75rem; cursor: pointer; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="letter-spacing: -1px;">CoreChat v3</h2>
            <input type="text" id="user-nickname" placeholder="Enter Nickname">
            <button class="btn-main" onclick="joinChat()">Enter Global Room</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div>
                <b style="font-size: 1.1rem;">Cloud Feed</b><br>
                <span class="sound-toggle" id="mute-btn" onclick="toggleMute()">🔔 ALERTS: ON</span>
            </div>
            <div style="font-size: 0.7rem; color: #888;">FIRESTORE_SYNC</div>
        </header>

        <div id="chat-scroller"></div>

        <footer>
            <button class="action-btn" onclick="promptMedia()">🖼️</button>
            <input type="text" id="msg-field" placeholder="Message..." autocomplete="off">
            <button class="action-btn" style="color: var(--accent);" onclick="sendText()">➤</button>
        </footer>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
apiKey: "AIzaSyBWtfnkI4DjCRrCMAhOXgF6xORY-D9A9mw",
  authDomain: "message-a82b4.firebaseapp.com",
  projectId: "message-a82b4",
  storageBucket: "message-a82b4.firebasestorage.app",
  messagingSenderId: "571635548948",
  appId: "1:571635548948:web:5ef619ee57a8b298327801"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myName = "";
    let muted = false;
    let firstLoad = true;

    function joinChat() {
        const input = document.getElementById('user-nickname');
        if(!input.value.trim()) return;
        myName = input.value.trim();
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        startSync();
    }

    function toggleMute() {
        muted = !muted;
        document.getElementById('mute-btn').innerText = muted ? "🔕 ALERTS: OFF" : "🔔 ALERTS: ON";
    }

    // Media via URL (Since Storage is cancelled)
    function promptMedia() {
        const url = prompt("Paste Image or Video URL:");
        if(!url) return;
        
        let type = 'image';
        if(url.includes('.mp4') || url.includes('youtube') || url.includes('video')) type = 'video';
        
        pushToFirebase({ user: myName, type: type, content: url });
    }

    function sendText() {
        const field = document.getElementById('msg-field');
        if(!field.value.trim()) return;
        pushToFirebase({ user: myName, type: 'text', content: field.value });
        field.value = "";
    }

    function pushToFirebase(data) {
        db.collection("chat_v3").add({
            ...data,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    function startSync() {
        db.collection("chat_v3").orderBy("timestamp", "asc")
        .onSnapshot((snapshot) => {
            const scroller = document.getElementById('chat-scroller');
            scroller.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const m = doc.data();
                const isMe = m.user === myName;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'sent' : 'received'}`;
                
                let inner = `<span class="sender-tag">${m.user}</span>`;
                if(m.type === 'text') inner += `<div>${m.content}</div>`;
                if(m.type === 'image') inner += `<img src="${m.content}" class="chat-img" onerror="this.src='https://via.placeholder.com/150?text=Invalid+Image+URL'">`;
                if(m.type === 'video') inner += `<video src="${m.content}" controls class="chat-vid"></video>`;

                div.innerHTML = inner;
                scroller.appendChild(div);
            });

            scroller.scrollTop = scroller.scrollHeight;

            // 5-Second Ringtone Logic
            if (!firstLoad && !muted) {
                const audio = document.getElementById('notif-sound');
                audio.play().catch(e => console.log("Audio requires user interaction first"));
                setTimeout(() => { 
                    audio.pause(); 
                    audio.currentTime = 0; 
                }, 5000);
            }
            firstLoad = false;
        });
    }

    document.getElementById('msg-field').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendText();
    });
</script>
</body>
</html>
