<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE | Unified Messaging</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #262626;
            --accent: #ffffff;
            --text-main: #e5e5e5;
            --text-dim: #737373;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100vh; display: flex; 
        }

        /* Access Overlay */
        #gate {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .gate-card { width: 320px; text-align: center; }
        .input-alt {
            width: 100%; background: transparent; border: 1px solid var(--border);
            padding: 15px; color: white; margin-bottom: 10px; font-size: 1rem;
        }
        .btn-alt {
            width: 100%; padding: 15px; background: var(--accent); color: black;
            border: none; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* Main Layout */
        .workspace {
            display: none; width: 100%; height: 100vh;
            grid-template-columns: 280px 1fr;
        }

        /* Sidebar */
        aside {
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .brand { padding: 30px; font-weight: 900; letter-spacing: 2px; border-bottom: 1px solid var(--border); }
        .user-card { padding: 20px; margin-top: auto; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

        /* Chat Engine */
        main { display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        
        #stream {
            flex: 1; overflow-y: auto; padding: 30px;
            display: flex; flex-direction: column; gap: 24px;
        }

        .row { display: flex; flex-direction: column; gap: 4px; max-width: 80%; }
        .row.mine { align-self: flex-end; align-items: flex-end; }
        .row.others { align-self: flex-start; }

        .u-name { font-size: 0.7rem; font-weight: bold; color: var(--text-dim); text-transform: uppercase; }
        .bubble {
            padding: 14px 18px; font-size: 0.95rem; line-height: 1.6;
            border: 1px solid var(--border); border-radius: 4px;
        }
        .mine .bubble { background: var(--accent); color: black; border: none; }
        .time-label { font-size: 0.6rem; color: var(--text-dim); }

        /* Input Bar */
        .input-dock { padding: 30px; border-top: 1px solid var(--border); display: flex; gap: 15px; }
        #msg-in {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            padding: 15px; color: white; outline: none;
        }
    </style>
</head>
<body>

    <div id="gate">
        <div class="gate-card">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">CORE</h1>
            <p style="color: var(--text-dim); margin-bottom: 40px;">v1.0.4 Global Messaging</p>
            <input type="text" id="user-id" class="input-alt" placeholder="IDENTIFICATION NAME">
            <button class="btn-alt" onclick="access()">Authenticate</button>
        </div>
    </div>

    <div class="workspace" id="app">
        <aside>
            <div class="brand">SYSTEM_CORE</div>
            <div style="padding: 30px; color: var(--text-dim); font-size: 0.8rem;">
                <p># GLOBAL_CHANNEL</p>
                <p># LOGS</p>
            </div>
            <div class="user-card">
                <div class="dot"></div>
                <span id="active-user" style="font-weight: bold;"></span>
            </div>
        </aside>

        <main>
            <header class="chat-header">
                <div style="font-weight: bold;">GLOBAL_STREAM</div>
                <div id="status-tag" style="font-size: 0.7rem; color: var(--text-dim);">FIRESTORE_SECURED</div>
            </header>

            <div id="stream"></div>

            <div class="input-dock">
                <input type="text" id="msg-in" placeholder="Write message..." autocomplete="off">
                <button class="btn-alt" style="width: auto; padding: 0 30px;" onclick="push()">Transmit</button>
            </div>
        </main>
    </div>

<script>
    // --- 1. CONFIGURATION ---
    const firebaseConfig = {
  apiKey: "AIzaSyBWtfnkI4DjCRrCMAhOXgF6xORY-D9A9mw",
  authDomain: "message-a82b4.firebaseapp.com",
  projectId: "message-a82b4",
  storageBucket: "message-a82b4.firebasestorage.app",
  messagingSenderId: "571635548948",
  appId: "1:571635548948:web:5ef619ee57a8b298327801"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let authName = "";

    // --- 2. LOGIC ---
    function access() {
        const name = document.getElementById('user-id').value.trim();
        if(!name) return;
        authName = name;
        document.getElementById('active-user').innerText = authName;
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        sync();
    }

    async function push() {
        const el = document.getElementById('msg-in');
        if(!el.value.trim()) return;

        await db.collection("core_stream").add({
            sender: authName,
            content: el.value,
            sentAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        el.value = "";
    }

    function sync() {
        db.collection("core_stream").orderBy("sentAt", "asc")
          .onSnapshot((snap) => {
            const stream = document.getElementById('stream');
            stream.innerHTML = "";
            
            snap.forEach((doc) => {
                const data = doc.data();
                const isMine = data.sender === authName;
                const time = data.sentAt ? new Date(data.sentAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "..";

                const node = document.createElement('div');
                node.className = `row ${isMine ? 'mine' : 'others'}`;
                node.innerHTML = `
                    <span class="u-name">${data.sender}</span>
                    <div class="bubble">${data.content}</div>
                    <span class="time-label">${time}</span>
                `;
                stream.appendChild(node);
            });
            stream.scrollTop = stream.scrollHeight;
        });
    }

    // Keyboard trigger
    document.getElementById('msg-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') push(); });
</script>

</body>
</html>
